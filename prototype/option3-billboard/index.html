<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 3 — Billboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff2d95;
    --cyan: #00e5ff;
    --gold: #ffd700;
    --bg: #08080f;
  }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Fullscreen canvas visualizer (behind everything) ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.18;
  }

  /* ── Dev toolbar ── */
  .dev-bar {
    position: relative;
    z-index: 100;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    padding: 6px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.7rem;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .dev-bar span { color: rgba(255,255,255,0.4); text-transform: uppercase; }
  .dev-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 0.7rem;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
  }
  .dev-btn.active { background: rgba(255,45,149,0.2); border-color: rgba(255,45,149,0.5); color: var(--pink); }

  /* ── Main layout: 3 rows ── */
  .layout {
    position: relative;
    z-index: 1;
    flex: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  /* ── TOP HUD STRIP ── */
  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 10px;
    background: linear-gradient(180deg, rgba(8,8,15,0.95) 0%, transparent 100%);
    gap: 12px;
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .player-name {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
    letter-spacing: 3px;
    color: var(--pink);
    text-shadow: 0 0 20px rgba(255,45,149,0.7);
    line-height: 1;
  }
  .player-meta {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .round-tag {
    font-size: 0.6rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .song-tag {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
  }
  .song-tag .artist { color: rgba(255,255,255,0.3); font-weight: 400; }

  .hud-stats {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hud-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 4px 10px;
    min-width: 48px;
  }
  .hud-stat .lbl { font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .hud-stat .val { font-family: 'Bangers', cursive; font-size: 1.1rem; letter-spacing: 1px; line-height: 1.1; }
  .hud-stat.t .val  { color: var(--cyan);  text-shadow: 0 0 8px rgba(0,229,255,0.6); }
  .hud-stat.e .val  { color: var(--pink);  text-shadow: 0 0 8px rgba(255,45,149,0.6); }
  .hud-stat.a .val  { color: var(--gold);  text-shadow: 0 0 8px rgba(255,215,0,0.6); }

  /* Energy bar in hud */
  .hud-energy {
    width: 80px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .energy-lbl { font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .energy-track {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 999px;
    overflow: hidden;
  }
  .energy-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), #c026d3, var(--gold));
    border-radius: 999px;
    transition: width 0.12s;
  }

  /* ── MIDDLE: optional coaching strip ── */
  .coaching-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    height: 28px;
    flex-shrink: 0;
  }
  .coaching-msg {
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .coaching-msg.visible { opacity: 1; }
  .coaching-msg.gold  { color: var(--gold); }
  .coaching-msg.cyan  { color: var(--cyan); }
  .coaching-msg.pink  { color: var(--pink); }
  .coaching-msg.white { color: rgba(255,255,255,0.7); }

  /* ── BOTTOM BILLBOARD: large lyrics ── */
  .billboard {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 24px 20px;
    background: linear-gradient(0deg, rgba(8,8,15,0.98) 0%, rgba(8,8,15,0.6) 60%, transparent 100%);
    gap: 8px;
  }

  .lyric-next-line {
    font-family: 'Bangers', cursive;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    letter-spacing: 3px;
    color: rgba(255,255,255,0.22);
    text-align: center;
    min-height: 1.8rem;
  }
  .lyric-current {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.5rem, 6.5vw, 5rem);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.1;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 0.15em;
    min-height: 5rem;
  }
  .syllable { transition: color 0.1s, text-shadow 0.1s; }
  .syllable.sung   { color: rgba(255,255,255,0.3); }
  .syllable.future { color: rgba(255,255,255,0.25); }
  .syllable.active.normal {
    color: var(--cyan);
    text-shadow: 0 0 25px rgba(0,229,255,0.9), 0 0 50px rgba(0,229,255,0.4);
  }
  .syllable.active.golden {
    color: var(--gold);
    text-shadow: 0 0 25px rgba(255,215,0,0.9), 0 0 50px rgba(255,215,0,0.4);
  }

  /* Bottom action row */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 6px;
  }
  .prev-hint {
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.18);
    font-style: italic;
    max-width: 40%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .finish-btn {
    background: rgba(185,28,28,0.2);
    border: 1px solid rgba(220,38,38,0.4);
    color: rgba(255,255,255,0.6);
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .finish-btn:not(:disabled):hover {
    background: rgba(220,38,38,0.3);
    border-color: rgba(220,38,38,0.65);
    color: #fff;
  }
  .finish-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .finish-btn.ready { background: rgba(220,38,38,0.3); border-color: rgba(220,38,38,0.6); color: #fff; }
  .finish-btn.freeform {
    background: rgba(80,80,100,0.3);
    border-color: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.55);
  }

  /* Freeform billboard */
  .freeform-billboard {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 8rem;
    text-align: center;
  }
  .freeform-giant {
    font-family: 'Bangers', cursive;
    font-size: clamp(3rem, 9vw, 6.5rem);
    letter-spacing: 6px;
    color: var(--pink);
    text-shadow: 0 0 50px rgba(255,45,149,0.7), 0 0 100px rgba(255,45,149,0.2);
    animation: breathe 2.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.025); }
  }
  .freeform-sub {
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
  }
</style>
</head>
<body>

<div class="dev-bar">
  <span>Prototype 3 — Billboard</span>
  <button class="dev-btn active" id="btn-curated" onclick="setMode('curated')">Curated</button>
  <button class="dev-btn" id="btn-freeform" onclick="setMode('freeform')">Freeform</button>
</div>

<!-- Fullscreen background visualizer -->
<canvas id="bg-canvas"></canvas>

<div class="layout">

  <!-- TOP: compact HUD -->
  <div class="hud">
    <div class="player-info">
      <div class="player-name">Alex 🎤</div>
      <div class="player-meta">
        <div class="round-tag">Round 1/2 · Singer 1 of 3</div>
        <div class="song-tag" id="song-tag">Don't Stop Believin' <span class="artist">· Journey</span></div>
      </div>
    </div>
    <div class="hud-stats">
      <div class="hud-stat t">
        <div class="lbl">Time</div>
        <div class="val" id="stat-time">0:00</div>
      </div>
      <div class="hud-stat e">
        <div class="lbl">Energy</div>
        <div class="val" id="stat-nrg">—</div>
      </div>
      <div class="hud-stat a" id="stat-acc-wrap">
        <div class="lbl">Accuracy</div>
        <div class="val" id="stat-acc">—</div>
      </div>
      <div class="hud-energy">
        <div class="energy-track">
          <div class="energy-fill" id="energy-fill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MIDDLE: coaching / feedback strip -->
  <div class="coaching-strip">
    <div class="coaching-msg gold" id="coaching-msg"></div>
  </div>

  <!-- BOTTOM BILLBOARD: huge lyrics -->
  <div class="billboard">

    <!-- Curated lyrics -->
    <div id="curated-lyrics">
      <div class="lyric-next-line" id="lyric-next">Strangers waiting, up and down the boulevard</div>
      <div class="lyric-current" id="lyric-active"></div>
      <div class="action-row">
        <div class="prev-hint" id="lyric-prev">Just a small town girl</div>
        <button class="finish-btn" id="finish-btn" disabled>🏁 Finish Early (40s)</button>
      </div>
    </div>

    <!-- Freeform -->
    <div id="freeform-billboard" style="display:none">
      <div class="freeform-billboard">
        <div class="freeform-giant" id="freeform-txt">SING IT! 🎤</div>
        <div class="freeform-sub">Let it all out — hit stop when done</div>
      </div>
      <div class="action-row" style="justify-content:flex-end">
        <button class="finish-btn freeform" id="finish-btn-ff">⏹ Stop</button>
      </div>
    </div>

  </div>
</div>

<script>
let mode = 'curated';
let elapsed = 0, energy = 0, accuracy = 0, finishCD = 40, syllableIdx = 0, lineIdx = 0;
let tick = 0;

const lines = [
  { prev: 'Just a small town girl', active: ['Liv-', 'ing', 'in', 'a', 'lone-', 'ly', 'world'], next: 'Strangers waiting, up and down the boulevard', golden: false },
  { prev: 'She took the midnight train', active: ['She', 'took', 'the', 'mid-', 'night', 'train', 'go-', 'in\'', 'an-', 'y-', 'where'], next: 'Just a city boy, born and raised in south Detroit', golden: true },
  { prev: 'Don\'t stop believin\'', active: ['Don\'t', 'stop', 'be-', 'lie-', 'vin\''], next: 'Hold on to that feeling', golden: true },
  { prev: 'Hold on to the feelin\'', active: ['Hold', 'on', 'to', 'the', 'feel-', 'in\''], next: 'Streetlight, people', golden: false },
];

function setMode(m) {
  mode = m;
  document.getElementById('btn-curated').classList.toggle('active', m === 'curated');
  document.getElementById('btn-freeform').classList.toggle('active', m === 'freeform');
  document.getElementById('curated-lyrics').style.display = m === 'curated' ? '' : 'none';
  document.getElementById('freeform-billboard').style.display = m === 'freeform' ? '' : 'none';
  document.getElementById('song-tag').style.display = m === 'curated' ? '' : 'none';
  document.getElementById('stat-acc-wrap').style.display = m === 'curated' ? '' : 'none';
  elapsed = 0; energy = 0; accuracy = 0; finishCD = 40; syllableIdx = 0; lineIdx = 0;
}

function renderLyrics() {
  const line = lines[lineIdx % lines.length];
  document.getElementById('lyric-prev').textContent = '↑ ' + line.prev;
  document.getElementById('lyric-next').textContent = line.next;
  const el = document.getElementById('lyric-active');
  el.innerHTML = line.active.map((s, i) => {
    let cls = i < syllableIdx ? 'syllable sung' : i === syllableIdx ? `syllable active ${line.golden ? 'golden' : 'normal'}` : 'syllable future';
    return `<span class="${cls}">${s}</span>`;
  }).join(' ');
}

// Background visualizer (fullscreen)
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);
let bars = new Float32Array(80).fill(0);

function drawBg() {
  requestAnimationFrame(drawBg);
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const bw = bgCanvas.width / bars.length;
  const H = bgCanvas.height;
  for (let i = 0; i < bars.length; i++) {
    const t = i / bars.length;
    const hue = 290 + t * 80;
    const h = bars[i] * H * 0.7;
    const a = 0.3 + bars[i] * 0.7;
    bgCtx.fillStyle = `hsla(${hue},100%,58%,${a})`;
    const x = i * bw + bw * 0.1;
    const w = bw * 0.8;
    bgCtx.beginPath();
    bgCtx.roundRect(x, H - h, w, h, 3);
    bgCtx.fill();
  }
}
drawBg();

// Coaching messages
const coachingMsgs = [
  { msg: 'Golden notes ahead! ⭐', cls: 'gold' },
  { msg: 'Chorus — go big! 🔥', cls: 'pink' },
  { msg: 'Breathe and hold that note', cls: 'cyan' },
  { msg: 'Bridge coming up!', cls: 'white' },
  { msg: 'You\'re absolutely nailing it!', cls: 'gold' },
];
let coachIdx = 0;
let coachHideTimer = null;
function showCoach() {
  if (mode !== 'curated') return;
  const c = coachingMsgs[coachIdx++ % coachingMsgs.length];
  const el = document.getElementById('coaching-msg');
  el.textContent = c.msg;
  el.className = `coaching-msg visible ${c.cls}`;
  clearTimeout(coachHideTimer);
  coachHideTimer = setTimeout(() => { el.classList.remove('visible'); }, 3500);
}

setInterval(() => {
  tick++;

  for (let i = 0; i < bars.length; i++) {
    const n = Math.sin(tick * 0.15 + i * 0.4) * 0.3 + Math.sin(tick * 0.08 + i * 0.7) * 0.2;
    bars[i] = Math.max(0.02, Math.min(1, (energy / 100) * (0.5 + n)));
  }

  elapsed++;
  energy = Math.min(100, Math.max(5, 42 + 33 * Math.sin(tick * 0.04) + 12 * Math.random()));
  accuracy = Math.min(100, Math.max(40, 74 + 16 * Math.sin(tick * 0.03) + 6 * Math.random()));

  document.getElementById('stat-time').textContent = `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}`;
  document.getElementById('stat-nrg').textContent = Math.round(energy);
  document.getElementById('stat-acc').textContent = Math.round(accuracy) + '%';
  document.getElementById('energy-fill').style.width = energy + '%';

  if (mode === 'curated') {
    syllableIdx++;
    const line = lines[lineIdx % lines.length];
    if (syllableIdx >= line.active.length) { syllableIdx = 0; lineIdx++; }
    renderLyrics();

    if (finishCD > 0) {
      finishCD--;
      const btn = document.getElementById('finish-btn');
      if (finishCD > 0) { btn.textContent = `🏁 Finish Early (${finishCD}s)`; btn.disabled = true; }
      else { btn.textContent = '🏁 Finish Early'; btn.disabled = false; btn.classList.add('ready'); }
    }
  } else {
    const msgs = ['SING IT! 🎤', 'GO GO GO! 🔥', 'FEEL IT! 🎶', 'LOUDER! 📢', 'YES! ⭐'];
    if (tick % 28 === 0) document.getElementById('freeform-txt').textContent = msgs[Math.floor(tick/28) % msgs.length];
  }

  if (tick % 48 === 5) showCoach();
}, 1000);

renderLyrics();
showCoach();
</script>
</body>
</html>
