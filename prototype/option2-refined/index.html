<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 2 — Refined Current</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff2d95;
    --cyan: #00e5ff;
    --gold: #ffd700;
    --bg: #0a0a1a;
  }

  body {
    background:
      radial-gradient(ellipse 60% 40% at 20% 110%, rgba(255,45,149,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,229,255,0.05) 0%, transparent 60%),
      #0a0a1a;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Dev toolbar ── */
  .dev-bar {
    width: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    padding: 6px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.7rem;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .dev-bar span { color: rgba(255,255,255,0.4); text-transform: uppercase; }
  .dev-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 0.7rem;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
  }
  .dev-btn.active { background: rgba(255,45,149,0.2); border-color: rgba(255,45,149,0.5); color: var(--pink); }

  /* ── Page container ── */
  .page {
    width: 100%;
    max-width: 640px;
    padding: 24px 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex: 1;
  }

  /* ── Header: turn label + player name + song ── */
  .header {
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
  }
  .turn-label {
    font-size: 0.62rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 4px;
  }
  .player-name {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: 3px;
    color: var(--pink);
    text-shadow: 0 0 20px rgba(255,45,149,0.6), 0 0 40px rgba(255,45,149,0.2);
    line-height: 1.1;
  }
  .song-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 3px;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.35);
    min-height: 1.2rem;
  }
  .song-line .title { color: rgba(255,255,255,0.6); font-weight: 600; }

  /* ── Floating toast (doesn't shift layout) ── */
  .toast-wrap {
    position: relative;
    width: 100%;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    overflow: visible;
  }
  .toast {
    position: absolute;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 4px 14px;
    border-radius: 999px;
    border: 1px solid transparent;
    backdrop-filter: blur(8px);
    white-space: nowrap;
    animation: toast-pop 0.25s ease-out;
    pointer-events: none;
  }
  .toast.cyan  { color: var(--cyan);  border-color: rgba(0,229,255,0.3);  background: rgba(0,229,255,0.06); }
  .toast.gold  { color: var(--gold);  border-color: rgba(255,215,0,0.3);  background: rgba(255,215,0,0.06); }
  .toast.pink  { color: var(--pink);  border-color: rgba(255,45,149,0.3); background: rgba(255,45,149,0.06); }
  .toast.white { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
  @keyframes toast-pop {
    from { opacity: 0; transform: scale(0.9) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Lyrics card ── */
  .lyrics-card {
    width: 100%;
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 16px 20px 20px;
    margin-bottom: 10px;
    transition: border-color 0.3s, box-shadow 0.3s;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }
  .lyrics-card.golden {
    border-color: rgba(255,215,0,0.25);
    box-shadow: 0 0 20px rgba(255,215,0,0.05);
  }

  .lyric-row {
    text-align: center;
    font-family: 'Bangers', cursive;
    letter-spacing: 2px;
    line-height: 1.2;
  }
  .lyric-prev { font-size: 0.95rem; color: rgba(255,255,255,0.2); }
  .lyric-active-row { font-size: clamp(1.5rem, 4vw, 2.2rem); }
  .lyric-next { font-size: 1.05rem; color: rgba(255,255,255,0.28); }

  .syllable { transition: color 0.1s, text-shadow 0.1s; }
  .syllable.sung   { color: rgba(255,255,255,0.35); }
  .syllable.future { color: rgba(255,255,255,0.3); }
  .syllable.active.normal {
    color: var(--cyan);
    text-shadow: 0 0 16px rgba(0,229,255,0.8);
  }
  .syllable.active.golden {
    color: var(--gold);
    text-shadow: 0 0 16px rgba(255,215,0,0.8);
  }

  .rap-badge {
    display: inline-block;
    background: rgba(255,45,149,0.15);
    border: 1px solid rgba(255,45,149,0.3);
    color: var(--pink);
    font-family: 'Outfit', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 2px;
    padding: 1px 5px;
    border-radius: 3px;
    vertical-align: middle;
    margin-left: 6px;
  }

  /* Freeform placeholder */
  .freeform-lyrics {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 140px;
    width: 100%;
  }
  .freeform-big {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    letter-spacing: 5px;
    color: var(--pink);
    text-shadow: 0 0 30px rgba(255,45,149,0.7);
    text-align: center;
    animation: breathe 2.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50%       { opacity: 1;    transform: scale(1.03); }
  }
  .freeform-hint {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  /* ── Visualizer ── */
  .viz-wrap {
    width: 100%;
    margin-bottom: 6px;
  }
  canvas {
    display: block;
    width: 100%;
    height: 52px;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
  }

  /* ── Bottom row: energy + stats + button ── */
  .bottom-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .stat-pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 5px 10px;
    min-width: 52px;
    flex-shrink: 0;
  }
  .stat-pill .label { font-size: 0.52rem; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
  .stat-pill .val   { font-family: 'Bangers', cursive; font-size: 1.05rem; letter-spacing: 1px; line-height: 1.1; }
  .stat-pill.time  .val { color: var(--cyan);  text-shadow: 0 0 8px rgba(0,229,255,0.6); }
  .stat-pill.nrg   .val { color: var(--pink);  text-shadow: 0 0 8px rgba(255,45,149,0.6); }
  .stat-pill.acc   .val { color: var(--gold);  text-shadow: 0 0 8px rgba(255,215,0,0.6); }

  .energy-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .energy-label { font-size: 0.52rem; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .energy-track {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 999px;
    overflow: hidden;
  }
  .energy-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), #c026d3, var(--gold));
    border-radius: 999px;
    transition: width 0.1s;
  }

  .finish-btn {
    background: linear-gradient(135deg, rgba(185,28,28,0.6), rgba(220,38,38,0.4));
    border: 1px solid rgba(220,38,38,0.5);
    color: #fff;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .finish-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .finish-btn.freeform {
    background: rgba(100,100,120,0.3);
    border-color: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.65);
  }
</style>
</head>
<body>

<div class="dev-bar">
  <span>Prototype 2 — Refined Current</span>
  <button class="dev-btn active" id="btn-curated" onclick="setMode('curated')">Curated</button>
  <button class="dev-btn" id="btn-freeform" onclick="setMode('freeform')">Freeform</button>
</div>

<div class="page">

  <!-- Header: player + song combined -->
  <div class="header">
    <div class="turn-label">Round 1/2 — Singer 1 of 3</div>
    <div class="player-name">Alex 🎤</div>
    <div class="song-line" id="song-line">
      <span class="title">Don't Stop Believin'</span>
      <span>· Journey</span>
    </div>
  </div>

  <!-- Floating feedback/coaching (doesn't shift layout) -->
  <div class="toast-wrap">
    <div class="toast cyan" id="toast" style="display:none"></div>
  </div>

  <!-- Lyrics / freeform -->
  <div class="lyrics-card" id="lyrics-card">
    <div id="curated-lyrics">
      <div class="lyric-row lyric-prev" id="lyric-prev">Just a small town girl</div>
      <div class="lyric-row lyric-active-row" id="lyric-active"></div>
      <div class="lyric-row lyric-next" id="lyric-next">Strangers waiting, up and down the boulevard</div>
    </div>
    <div class="freeform-lyrics" id="freeform-lyrics" style="display:none">
      <div class="freeform-big" id="freeform-txt">SING YOUR HEART OUT! 🎤</div>
      <div class="freeform-hint">Hit stop when you're done</div>
    </div>
  </div>

  <!-- Visualizer -->
  <div class="viz-wrap">
    <canvas id="viz-canvas"></canvas>
  </div>

  <!-- Bottom row: stats + energy + button all in one line -->
  <div class="bottom-row">
    <div class="stat-pill time">
      <div class="label">Time</div>
      <div class="val" id="stat-time">0:00</div>
    </div>
    <div class="stat-pill nrg">
      <div class="label">Energy</div>
      <div class="val" id="stat-nrg">—</div>
    </div>
    <div class="stat-pill acc" id="stat-acc-pill">
      <div class="label" id="stat-acc-label">Accuracy</div>
      <div class="val" id="stat-acc">—</div>
    </div>
    <div class="energy-col">
      <div class="energy-track">
        <div class="energy-fill" id="energy-fill" style="width: 0%"></div>
      </div>
    </div>
    <button class="finish-btn" id="finish-btn" disabled>🏁 (40s)</button>
  </div>

</div>

<script>
let mode = 'curated';
let elapsed = 0, energy = 0, accuracy = 0, finishCD = 40, syllableIdx = 0, lineIdx = 0;
let tick = 0;

const lines = [
  { prev: 'Just a small town girl', active: ['Liv-', 'ing', 'in', 'a', 'lone-', 'ly', 'world'], next: 'Strangers waiting, up and down the boulevard', golden: false },
  { prev: 'She took the midnight train', active: ['She', 'took', 'the', 'mid-', 'night', 'train', 'go-', 'in\'', 'an-', 'y-', 'where'], next: 'Just a city boy, born and raised in south Detroit', golden: true },
  { prev: 'Don\'t stop believin\'', active: ['Don\'t', 'stop', 'be-', 'lie-', 'vin\''], next: 'Hold on to that feeling', golden: true },
  { prev: 'Hold on to the feelin\'', active: ['Hold', 'on', 'to', 'the', 'feel-', 'in\''], next: 'Streetlight, people', golden: false },
];

function setMode(m) {
  mode = m;
  document.getElementById('btn-curated').classList.toggle('active', m === 'curated');
  document.getElementById('btn-freeform').classList.toggle('active', m === 'freeform');
  document.getElementById('curated-lyrics').style.display = m === 'curated' ? '' : 'none';
  document.getElementById('freeform-lyrics').style.display = m === 'freeform' ? '' : 'none';
  document.getElementById('song-line').style.display = m === 'curated' ? '' : 'none';
  document.getElementById('stat-acc-pill').style.display = m === 'curated' ? '' : 'none';
  document.getElementById('lyrics-card').style.background = m === 'freeform' ? 'transparent' : '';
  document.getElementById('lyrics-card').style.border = m === 'freeform' ? 'none' : '';
  const btn = document.getElementById('finish-btn');
  btn.className = m === 'freeform' ? 'finish-btn freeform' : 'finish-btn';
  btn.textContent = m === 'freeform' ? '⏹ Stop' : '🏁 (40s)';
  btn.disabled = m === 'curated';
  elapsed = 0; energy = 0; accuracy = 0; finishCD = 40; syllableIdx = 0; lineIdx = 0;
}

function renderLyrics() {
  const line = lines[lineIdx % lines.length];
  document.getElementById('lyric-prev').textContent = line.prev;
  document.getElementById('lyric-next').textContent = line.next;
  const card = document.getElementById('lyrics-card');
  card.className = 'lyrics-card' + (line.golden ? ' golden' : '');
  const el = document.getElementById('lyric-active');
  el.innerHTML = line.active.map((s, i) => {
    let cls = i < syllableIdx ? 'syllable sung' : i === syllableIdx ? `syllable active ${line.golden ? 'golden' : 'normal'}` : 'syllable future';
    return `<span class="${cls}">${s}</span>`;
  }).join(' ');
}

let toastTimer = null;
const toasts = [
  { msg: 'Chorus coming up! 🎶', cls: 'gold' },
  { msg: 'You\'re killing it! 🔥', cls: 'pink' },
  { msg: 'Breathe and project!', cls: 'cyan' },
  { msg: 'Golden notes here ⭐', cls: 'gold' },
  { msg: 'Big finish incoming!', cls: 'white' },
];
let toastIdx = 0;
function showToast() {
  if (mode !== 'curated') return;
  const t = toasts[toastIdx++ % toasts.length];
  const el = document.getElementById('toast');
  el.textContent = t.msg;
  el.className = `toast ${t.cls}`;
  el.style.display = '';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// Visualizer
const canvas = document.getElementById('viz-canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = canvas.offsetWidth * devicePixelRatio; canvas.height = canvas.offsetHeight * devicePixelRatio; }
resize();
window.addEventListener('resize', resize);
let bars = new Float32Array(56).fill(0);
function drawViz() {
  requestAnimationFrame(drawViz);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bw = canvas.width / bars.length;
  for (let i = 0; i < bars.length; i++) {
    const t = i / bars.length;
    const hue = 300 + t * 60;
    const h = bars[i] * canvas.height * 0.88;
    const a = 0.5 + bars[i] * 0.5;
    ctx.fillStyle = `hsla(${hue},100%,62%,${a})`;
    ctx.beginPath();
    ctx.roundRect(i * bw + bw * 0.15, canvas.height - h, bw * 0.7, h, 2);
    ctx.fill();
  }
}
drawViz();

setInterval(() => {
  tick++;
  for (let i = 0; i < bars.length; i++) {
    const n = Math.sin(tick * 0.15 + i * 0.4) * 0.3 + Math.sin(tick * 0.08 + i * 0.7) * 0.2;
    bars[i] = Math.max(0.02, Math.min(1, (energy / 100) * (0.5 + n)));
  }

  elapsed++;
  energy = Math.min(100, Math.max(5, 42 + 33 * Math.sin(tick * 0.04) + 12 * Math.random()));
  accuracy = Math.min(100, Math.max(40, 72 + 18 * Math.sin(tick * 0.03) + 6 * Math.random()));

  document.getElementById('stat-time').textContent = `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}`;
  document.getElementById('stat-nrg').textContent = Math.round(energy);
  document.getElementById('stat-acc').textContent = Math.round(accuracy) + '%';
  document.getElementById('energy-fill').style.width = energy + '%';

  if (mode === 'curated') {
    syllableIdx++;
    const line = lines[lineIdx % lines.length];
    if (syllableIdx >= line.active.length) { syllableIdx = 0; lineIdx++; }
    renderLyrics();
  } else {
    const msgs = ['SING YOUR HEART OUT! 🎤', 'FEEL THE MUSIC! 🎶', 'GO FOR IT! 🔥', 'LOUDER! 📢'];
    if (tick % 25 === 0) document.getElementById('freeform-txt').textContent = msgs[Math.floor(tick/25) % msgs.length];
  }

  if (mode === 'curated' && finishCD > 0) {
    finishCD--;
    const btn = document.getElementById('finish-btn');
    if (finishCD > 0) { btn.textContent = `🏁 (${finishCD}s)`; btn.disabled = true; }
    else { btn.textContent = '🏁 Finish Early'; btn.disabled = false; }
  }

  if (tick % 45 === 8) showToast();
}, 1000);

renderLyrics();
showToast();
</script>
</body>
</html>
