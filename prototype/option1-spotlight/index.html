<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 1 — Stage Spotlight</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff2d95;
    --cyan: #00e5ff;
    --gold: #ffd700;
    --green: #39ff14;
    --bg: #07070f;
  }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── Spotlight background ── */
  .spotlight {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 55% at 50% 45%, rgba(255,45,149,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(45,27,105,0.5) 0%, transparent 70%),
      #07070f;
    transition: background 0.5s;
    z-index: 0;
  }
  .spotlight.golden {
    background:
      radial-gradient(ellipse 60% 55% at 50% 45%, rgba(255,215,0,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(45,27,105,0.5) 0%, transparent 70%),
      #07070f;
  }
  .spotlight.high-energy {
    background:
      radial-gradient(ellipse 70% 65% at 50% 45%, rgba(255,45,149,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 90% 70% at 50% 100%, rgba(45,27,105,0.7) 0%, transparent 70%),
      #07070f;
  }

  /* ── Visualizer canvas (background layer) ── */
  #viz-canvas {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 35%;
    z-index: 1;
    opacity: 0.35;
  }

  /* ── Main layout ── */
  .stage {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr auto;
    padding: 16px 20px 20px;
    gap: 0;
  }

  /* ── Top HUD ── */
  .hud-left {
    grid-row: 1;
    grid-column: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .player-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,45,149,0.12);
    border: 1px solid rgba(255,45,149,0.3);
    border-radius: 999px;
    padding: 4px 12px 4px 8px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--pink);
    text-shadow: 0 0 8px rgba(255,45,149,0.6);
  }
  .player-chip .emoji { font-size: 1rem; }
  .round-badge {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
  }
  .song-badge {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .song-badge span:first-child { color: rgba(255,255,255,0.55); }

  .hud-right {
    grid-row: 1;
    grid-column: 2;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .stat-chip .label { font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; opacity: 0.45; font-weight: 400; margin-bottom: 1px; }
  .stat-chip .value { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 1px; }
  .stat-chip.time .value  { color: var(--cyan); text-shadow: 0 0 10px rgba(0,229,255,0.7); }
  .stat-chip.energy .value { color: var(--pink); text-shadow: 0 0 10px rgba(255,45,149,0.7); }
  .stat-chip.score .value  { color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.7); }

  /* ── Center stage: lyrics ── */
  .lyrics-stage {
    grid-row: 2;
    grid-column: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 20px 5vw;
  }

  .lyric-prev {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.1rem, 2.8vw, 1.6rem);
    letter-spacing: 3px;
    color: rgba(255,255,255,0.18);
    text-align: center;
    margin-bottom: 20px;
    min-height: 2rem;
    transition: opacity 0.3s;
  }

  .lyric-active {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.4rem, 7vw, 5.5rem);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.15;
    min-height: 6rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 0.2em;
  }
  .syllable { transition: color 0.12s, text-shadow 0.12s; }
  .syllable.sung  { color: rgba(255,255,255,0.35); text-shadow: none; }
  .syllable.active.normal {
    color: var(--cyan);
    text-shadow: 0 0 30px rgba(0,229,255,0.9), 0 0 60px rgba(0,229,255,0.4);
    animation: syllable-pulse 0.3s ease-out;
  }
  .syllable.active.golden {
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.9), 0 0 60px rgba(255,215,0,0.4);
    animation: syllable-pulse 0.3s ease-out;
  }
  .syllable.future { color: rgba(255,255,255,0.28); }
  @keyframes syllable-pulse {
    0%   { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .lyric-next {
    font-family: 'Bangers', cursive;
    font-size: clamp(1.3rem, 3vw, 2rem);
    letter-spacing: 3px;
    color: rgba(255,255,255,0.28);
    text-align: center;
    margin-top: 24px;
    min-height: 2.5rem;
  }

  /* Freeform mode: big motivational text */
  .freeform-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .freeform-main {
    font-family: 'Bangers', cursive;
    font-size: clamp(3rem, 9vw, 7rem);
    letter-spacing: 6px;
    color: var(--pink);
    text-shadow: 0 0 40px rgba(255,45,149,0.8);
    text-align: center;
    animation: breathe 2.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50%       { transform: scale(1.04); opacity: 1; }
  }
  .freeform-sub {
    font-size: 0.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  /* ── Toast overlay (coaching / feedback) ── */
  .toast-overlay {
    position: fixed;
    top: 68px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    pointer-events: none;
  }
  .toast {
    background: rgba(10,10,26,0.8);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 0.78rem;
    letter-spacing: 1px;
    backdrop-filter: blur(8px);
    animation: toast-in 0.3s ease-out;
    white-space: nowrap;
  }
  .toast.cyan   { color: var(--cyan); border-color: rgba(0,229,255,0.3); }
  .toast.gold   { color: var(--gold); border-color: rgba(255,215,0,0.3); }
  .toast.pink   { color: var(--pink); border-color: rgba(255,45,149,0.3); }
  .toast.white  { color: rgba(255,255,255,0.8); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Bottom controls ── */
  .controls {
    grid-row: 3;
    grid-column: 1 / 3;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-top: 8px;
  }

  .energy-bar-wrap {
    flex: 1;
    margin-right: 20px;
  }
  .energy-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 4px;
  }
  .energy-track {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
  }
  .energy-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), #c026d3, var(--gold));
    border-radius: 999px;
    transition: width 0.1s;
  }

  .finish-btn {
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.4);
    color: rgba(255,255,255,0.7);
    border-radius: 999px;
    padding: 8px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .finish-btn:not(:disabled):hover {
    background: rgba(220,38,38,0.3);
    border-color: rgba(220,38,38,0.7);
    color: #fff;
  }
  .finish-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .finish-btn.ready {
    background: rgba(220,38,38,0.25);
    border-color: rgba(220,38,38,0.6);
    color: #fff;
  }

  /* ── Dev controls ── */
  .dev-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    padding: 6px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 100;
    font-size: 0.7rem;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .dev-bar span { color: rgba(255,255,255,0.4); text-transform: uppercase; }
  .dev-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 0.7rem;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
  }
  .dev-btn.active {
    background: rgba(255,45,149,0.2);
    border-color: rgba(255,45,149,0.5);
    color: var(--pink);
  }

  .stage { padding-top: 52px; }
</style>
</head>
<body>

<!-- Dev controls -->
<div class="dev-bar">
  <span>Prototype 1 — Stage Spotlight</span>
  <button class="dev-btn active" id="btn-curated" onclick="setMode('curated')">Curated</button>
  <button class="dev-btn" id="btn-freeform" onclick="setMode('freeform')">Freeform</button>
</div>

<div class="spotlight" id="spotlight"></div>
<canvas id="viz-canvas"></canvas>

<div class="stage">
  <!-- Top HUD -->
  <div class="hud-left">
    <div class="player-chip">
      <span class="emoji">🎤</span>
      Alex
    </div>
    <div class="round-badge">Round 1/2 · Singer 1 of 3</div>
    <div class="song-badge" id="song-badge">
      <span>Don't Stop Believin'</span>
      <span>· Journey</span>
    </div>
  </div>
  <div class="hud-right">
    <div class="stat-chip time">
      <div>
        <div class="label">Time</div>
        <div class="value" id="stat-time">0:00</div>
      </div>
    </div>
    <div class="stat-chip energy">
      <div>
        <div class="label">Energy</div>
        <div class="value" id="stat-energy">—</div>
      </div>
    </div>
    <div class="stat-chip score" id="stat-score-wrap">
      <div>
        <div class="label" id="stat-score-label">Accuracy</div>
        <div class="value" id="stat-score">—</div>
      </div>
    </div>
  </div>

  <!-- Lyrics / freeform center -->
  <div class="lyrics-stage" id="lyrics-stage">
    <!-- Curated lyrics -->
    <div id="curated-lyrics">
      <div class="lyric-prev" id="lyric-prev">Just a small town girl</div>
      <div class="lyric-active" id="lyric-active"></div>
      <div class="lyric-next" id="lyric-next">Strangers waiting, up and down the boulevard</div>
    </div>
    <!-- Freeform mode -->
    <div class="freeform-center" id="freeform-lyrics" style="display:none">
      <div class="freeform-main" id="freeform-text">SING IT! 🎤</div>
      <div class="freeform-sub">Hit STOP when you're done</div>
    </div>
  </div>

  <!-- Bottom controls -->
  <div class="controls">
    <div class="energy-bar-wrap">
      <div class="energy-label">Energy</div>
      <div class="energy-track">
        <div class="energy-fill" id="energy-fill" style="width: 0%"></div>
      </div>
    </div>
    <button class="finish-btn" id="finish-btn" disabled>🏁 Finish Early (40s)</button>
  </div>
</div>

<!-- Toast overlay -->
<div class="toast-overlay" id="toast-overlay" style="display:none">
  <div class="toast" id="toast-msg"></div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────
let mode = 'curated';
let elapsed = 0;
let energy = 0;
let accuracy = 0;
let finishCountdown = 40;
let syllableIdx = 0;
let goldenLine = false;
let highEnergy = false;
let toastTimeout = null;

// Lyrics simulation data
const lines = [
  { prev: 'Just a small town girl', active: ['Liv-', 'ing', 'in', 'a', 'lone-', 'ly', 'world'], next: 'Strangers waiting, up and down the boulevard', golden: false },
  { prev: 'Livin\' in a lonely world', active: ['She', 'took', 'the', 'mid-', 'night', 'train', 'go-', 'in\'', 'an-', 'y-', 'where'], next: 'Just a city boy, born and raised in south Detroit', golden: true },
  { prev: 'She took the midnight train', active: ['Don\'t', 'stop', 'be-', 'lie-', 'vin\''], next: 'Hold on to that feeling', golden: true },
  { prev: 'Don\'t stop believin\'', active: ['Hold', 'on', 'to', 'the', 'feel-', 'in\''], next: 'Streetlight, people', golden: false },
];
let lineIdx = 0;

function setMode(m) {
  mode = m;
  document.getElementById('btn-curated').classList.toggle('active', m === 'curated');
  document.getElementById('btn-freeform').classList.toggle('active', m === 'freeform');
  document.getElementById('curated-lyrics').style.display = m === 'curated' ? '' : 'none';
  document.getElementById('freeform-lyrics').style.display = m === 'freeform' ? '' : 'none';
  document.getElementById('song-badge').style.display = m === 'curated' ? '' : 'none';
  document.getElementById('stat-score-wrap').style.display = m === 'curated' ? '' : 'none';
  elapsed = 0; energy = 0; accuracy = 0; finishCountdown = 40; syllableIdx = 0; lineIdx = 0;
}

// ── Lyrics rendering ──────────────────────────────────────────────────
function renderLine() {
  const line = lines[lineIdx % lines.length];
  goldenLine = line.golden;
  document.getElementById('lyric-prev').textContent = line.prev;
  document.getElementById('lyric-next').textContent = line.next;
  const el = document.getElementById('lyric-active');
  el.innerHTML = line.active.map((s, i) => {
    let cls = 'syllable future';
    if (i < syllableIdx)  cls = 'syllable sung';
    if (i === syllableIdx) cls = `syllable active ${goldenLine ? 'golden' : 'normal'}`;
    return `<span class="${cls}">${s}</span>`;
  }).join(' ');

  // Spotlight tint
  const spotlight = document.getElementById('spotlight');
  spotlight.className = 'spotlight' + (goldenLine ? ' golden' : '') + (highEnergy ? ' high-energy' : '');
}

// ── Toast ─────────────────────────────────────────────────────────────
const toasts = [
  { msg: 'Nail those high notes! 🎯', cls: 'gold' },
  { msg: 'You\'re on fire! 🔥', cls: 'pink' },
  { msg: 'Breathe from your diaphragm', cls: 'cyan' },
  { msg: 'Chorus coming up! 🎶', cls: 'gold' },
  { msg: 'Project your voice!', cls: 'white' },
];
let toastIdx = 0;
function showToast() {
  if (mode !== 'curated') return;
  const t = toasts[toastIdx++ % toasts.length];
  const overlay = document.getElementById('toast-overlay');
  const msg = document.getElementById('toast-msg');
  msg.textContent = t.msg;
  msg.className = `toast ${t.cls}`;
  overlay.style.display = '';
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { overlay.style.display = 'none'; }, 3200);
}

// ── Canvas visualizer ─────────────────────────────────────────────────
const canvas = document.getElementById('viz-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.35;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let vizBars = new Float32Array(64).fill(0);
function drawViz() {
  requestAnimationFrame(drawViz);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const barW = canvas.width / vizBars.length;
  const baseH = canvas.height;
  for (let i = 0; i < vizBars.length; i++) {
    const t = i / vizBars.length;
    const hue = 300 + t * 60;
    const h = vizBars[i] * baseH * 0.9;
    const alpha = 0.4 + vizBars[i] * 0.6;
    ctx.fillStyle = `hsla(${hue},100%,60%,${alpha})`;
    const x = i * barW + barW * 0.15;
    const w = barW * 0.7;
    ctx.beginPath();
    ctx.roundRect(x, baseH - h, w, h, 3);
    ctx.fill();
  }
}
drawViz();

// ── Main tick ─────────────────────────────────────────────────────────
let tick = 0;
setInterval(() => {
  tick++;

  // Animate viz bars
  for (let i = 0; i < vizBars.length; i++) {
    const noise = Math.sin(tick * 0.15 + i * 0.4) * 0.3 + Math.sin(tick * 0.08 + i * 0.7) * 0.2;
    const base = energy / 100;
    vizBars[i] = Math.max(0.02, Math.min(1, base * (0.5 + noise)));
  }

  // Update stats
  elapsed++;
  energy = 40 + 35 * Math.sin(tick * 0.04) + 15 * Math.random();
  energy = Math.min(100, Math.max(5, energy));
  accuracy = 70 + 20 * Math.sin(tick * 0.03) + 5 * Math.random();
  highEnergy = energy > 70;

  document.getElementById('stat-time').textContent = `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}`;
  document.getElementById('stat-energy').textContent = Math.round(energy);
  document.getElementById('stat-score').textContent = Math.round(accuracy) + '%';
  document.getElementById('energy-fill').style.width = energy + '%';

  // Advance syllable
  if (mode === 'curated') {
    syllableIdx++;
    const line = lines[lineIdx % lines.length];
    if (syllableIdx >= line.active.length) {
      syllableIdx = 0;
      lineIdx++;
    }
    renderLine();
  } else {
    const freeformTexts = ['SING IT! 🎤', 'GO GO GO! 🔥', 'FEEL IT! 🎶', 'LOUDER! 📢', 'YES! 🌟'];
    if (tick % 30 === 0) {
      document.getElementById('freeform-text').textContent = freeformTexts[Math.floor(tick/30) % freeformTexts.length];
    }
  }

  // Finish countdown
  if (finishCountdown > 0) {
    finishCountdown--;
    const btn = document.getElementById('finish-btn');
    if (finishCountdown > 0) {
      btn.textContent = `🏁 Finish Early (${finishCountdown}s)`;
      btn.disabled = true;
    } else {
      btn.textContent = `🏁 Finish Early`;
      btn.disabled = false;
      btn.classList.add('ready');
    }
  }

  // Periodic toast
  if (tick % 45 === 10) showToast();

}, 1000);

// Init
renderLine();
showToast();
</script>
</body>
</html>
