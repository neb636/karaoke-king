<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spotify Authorization</title>
  <style>
    body {
      font-family: monospace; background: #1a1a1a; color: #e0e0e0;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0;
    }
    .card {
      background: #222; border: 1px solid #333; border-radius: 8px;
      padding: 32px; max-width: 500px; text-align: center;
    }
    h2 { margin: 0 0 16px; font-size: 18px; }
    .code-box {
      background: #111; border: 1px solid #555; border-radius: 4px;
      padding: 12px; margin: 16px 0; word-break: break-all;
      font-size: 13px; cursor: pointer; user-select: all;
    }
    .hint { color: #888; font-size: 12px; }
    .copied { color: #1db954; font-weight: bold; }
    .error { color: #e74c3c; }
    button {
      padding: 8px 20px; background: #1db954; color: #000; border: none;
      border-radius: 4px; font-family: inherit; font-size: 13px;
      cursor: pointer; font-weight: 600; margin-top: 8px;
    }
    button:hover { background: #1ed760; }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");
    const card = document.getElementById("card");

    if (error) {
      card.innerHTML = `
        <h2 class="error">Authorization Failed</h2>
        <p>${error}</p>
        <p class="hint">Close this tab and try again.</p>`;
    } else if (code) {
      card.innerHTML = `
        <h2>Authorization Successful</h2>
        <p class="hint">Copy this code and paste it into the calibration tool:</p>
        <div class="code-box" id="code-box">${code}</div>
        <button id="copy-btn">Copy to Clipboard</button>
        <p class="hint" id="status">Click the code or the button to copy.</p>`;

      document.getElementById("copy-btn").addEventListener("click", copyCode);
      document.getElementById("code-box").addEventListener("click", copyCode);

      function copyCode() {
        navigator.clipboard.writeText(code).then(() => {
          document.getElementById("status").innerHTML =
            '<span class="copied">Copied! Paste it in the calibration tool and close this tab.</span>';
        });
      }
    } else {
      card.innerHTML = `
        <h2 class="error">Missing Code</h2>
        <p class="hint">No authorization code found in the URL. Try logging in again.</p>`;
    }
  </script>
</body>
</html>
