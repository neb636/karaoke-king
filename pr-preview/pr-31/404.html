<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Karaoke King</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages 404s on a deep path (e.g. /karaoke-king/spotify-callback),
      // this encodes the path as a query param and redirects to the root index.html,
      // which then restores it so React Router sees the correct route.
      //
      // pathSegmentsToKeep=1 preserves the /karaoke-king/ repo prefix.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
